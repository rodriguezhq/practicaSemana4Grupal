<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Page 01 - Práctica Calificada</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="window">
            <div class="title-bar">
                <svg
                    viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg"
                    title="Settings"
                >
                    <path
                        d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.3.07-.62.07-.94s-.03-.65-.07-.95l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.3-.07.62-.07.94s.03.65.07.95L2.86 14.53c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.04.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.21.07-.47-.12-.61l-2.01-1.58z"
                    />
                </svg>
                <svg
                    viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg"
                    title="Notifications"
                >
                    <path
                        d="M21 19v1H3v-1l2-2v-6c0-3.1 2.03-5.83 5-6.71V4a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.29c2.97.88 5 3.61 5 6.71v6l2 2m-7 2a2 2 0 0 1-2 2 2 2 0 0 1-2-2"
                    />
                </svg>
                <svg
                    viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg"
                    title="Copy"
                >
                    <path
                        d="M19 21H8V7h11m0-2H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2m-3-4H4a2 2 0 0 0-2 2v14h2V3h12V1z"
                    />
                </svg>
                <svg
                    viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg"
                    title="Code"
                >
                    <path
                        d="M14.6 16.6l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4m-5.2 0L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4z"
                    />
                </svg>
            </div>

            <form class="form-content">
                <div class="field-group">
                    <input type="text" id="name" name="name" placeholder=" " />
                    <label for="name">Name</label>
                </div>

                <div class="field-group">
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder=" "
                    />
                    <label for="email">E-mail</label>
                </div>

                <div class="field-group">
                    <input type="text" id="item" name="item" placeholder=" " />
                    <label for="item">Item</label>
                </div>

                <div class="drop-wrapper">
                    <label class="drop-label" for="fileInput">
                        <svg
                            viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                d="M8.5 13.5l2.5 3 3.5-4.5 4.5 6H5m16 1V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z"
                            />
                        </svg>
                        <span>Drag &amp; drop una imagen aquí</span>
                    </label>
                    <input
                        class="drop-input"
                        type="file"
                        id="fileInput"
                        name="fileInput"
                        accept="image/*"
                    />
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="agree" name="agree" />
                    <label for="agree">Do you agree?</label>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-submit">SUBMIT</button>
                    <button type="reset" class="btn btn-clear">CLEAR</button>
                </div>
            </form>
        </div>
    </body>
</html>
